<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <!-- Background -->
  <rect width="800" height="380" fill="#1C2535"/>

  <!-- Title -->
  <text x="40" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="3" fill="#F5C400">ZELTA SLACK THEME PACK</text>
  <line x1="40" y1="58" x2="760" y2="58" stroke="#243044" stroke-width="1.5"/>

  <!-- === THEME 11: High Contrast === -->
  <g transform="translate(40, 76)">
    <rect width="350" height="84" rx="6" fill="#000000"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#111111"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Zelta High Contrast</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.6">Pure black and Zelta gold</text>
    <circle cx="78"  cy="68" r="7" fill="#000000" stroke="#333" stroke-width="1"/>
    <circle cx="98"  cy="68" r="7" fill="#111111" stroke="#333" stroke-width="1"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#FFFFFF"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>

  <!-- === THEME 12: Nord === -->
  <g transform="translate(40, 172)">
    <rect width="350" height="84" rx="6" fill="#2E3440"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#3B4252"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#D8DEE9">Zelta Nord</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#D8DEE9" opacity="0.6">Arctic blue, Zelta gold</text>
    <circle cx="78"  cy="68" r="7" fill="#2E3440"/>
    <circle cx="98"  cy="68" r="7" fill="#3B4252"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#D8DEE9"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>

  <!-- === THEME 13: Groovy === -->
  <g transform="translate(40, 268)">
    <rect width="350" height="84" rx="6" fill="#2D1B69"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#3D2580"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#F7C59F">Zelta Groovy</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#F7C59F" opacity="0.6">70s purple, gold and hot pink</text>
    <circle cx="78"  cy="68" r="7" fill="#2D1B69"/>
    <circle cx="98"  cy="68" r="7" fill="#3D2580"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#F7C59F"/>
    <circle cx="158" cy="68" r="7" fill="#FF1493"/>
  </g>

  <!-- === THEME 14: Cosmic === -->
  <g transform="translate(420, 76)">
    <rect width="350" height="84" rx="6" fill="#120E1E"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#1E1535"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>
    <!-- Stars -->
    <circle cx="280" cy="16" r="1" fill="#D4C8F0" opacity="0.8"/>
    <circle cx="300" cy="32" r="1.5" fill="#D4C8F0" opacity="0.6"/>
    <circle cx="260" cy="44" r="1" fill="#D4C8F0" opacity="0.7"/>
    <circle cx="320" cy="56" r="1" fill="#D4C8F0" opacity="0.5"/>
    <circle cx="290" cy="68" r="1.5" fill="#D4C8F0" opacity="0.4"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#D4C8F0">Zelta Cosmic</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#D4C8F0" opacity="0.6">Deep space purple, Zelta gold</text>
    <circle cx="78"  cy="68" r="7" fill="#120E1E"/>
    <circle cx="98"  cy="68" r="7" fill="#1E1535"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#2A1F4A"/>
    <circle cx="158" cy="68" r="7" fill="#D4C8F0"/>
    <circle cx="178" cy="68" r="7" fill="#F5C400"/>
  </g>

  <!-- Zelta wordmark bottom right -->
  <text x="660" y="352" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="3" fill="#F5C400" opacity="0.4">zelta</text>
</svg>

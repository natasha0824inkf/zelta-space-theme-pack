    <circle cx="98"  cy="68" r="7" fill="#1C2535"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#243044"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>

  <!-- === THEME 9: PHP === -->
  <g transform="translate(420, 364)">
    <rect width="350" height="84" rx="6" fill="#4F5B93"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#3D4777"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8EDF5">Zelta PHP</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#E8EDF5" opacity="0.6">PHP purple, Zelta gold</text>
    <circle cx="78"  cy="68" r="7" fill="#4F5B93"/>
    <circle cx="98"  cy="68" r="7" fill="#3D4777"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#E8EDF5"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>

  <!-- === THEME 10: Python === -->
  <g transform="translate(420, 460)">
    <rect width="350" height="84" rx="6" fill="#306998"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#1E4D78"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8EDF5">Zelta Python</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#E8EDF5" opacity="0.6">Python blue, Zelta gold</text>
    <circle cx="78"  cy="68" r="7" fill="#306998"/>
    <circle cx="98"  cy="68" r="7" fill="#1E4D78"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#E8EDF5"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>

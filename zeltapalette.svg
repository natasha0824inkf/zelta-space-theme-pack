<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <!-- Background -->
  <rect width="800" height="520" fill="#1C2535"/>

  <!-- Title -->
  <text x="40" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="3" fill="#F5C400">ZELTA SLACK THEME PACK</text>
  <line x1="40" y1="58" x2="760" y2="58" stroke="#243044" stroke-width="1.5"/>

  <!-- Helper: each theme card = 175w x 90h, 2 cols of 7 -->
  <!-- Col 1: x=40, Col 2: x=420 -->
  <!-- Row spacing: 90 + 12 = 102, starting y=76 -->

  <!-- === THEME 1: Classic === -->
  <g transform="translate(40, 76)">
    <rect width="350" height="84" rx="6" fill="#1C2535"/>
    <rect width="6" height="84" rx="3" fill="#C9A227"/>
    <rect x="6" y="0" width="56" height="84" fill="#243044"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#C9A227" opacity="0.9"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8EDF5">Zelta Classic</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#E8EDF5" opacity="0.6">Muted brass gold</text>
    <circle cx="78"  cy="68" r="7" fill="#1C2535"/>
    <circle cx="98"  cy="68" r="7" fill="#243044"/>
    <circle cx="118" cy="68" r="7" fill="#C9A227"/>
    <circle cx="138" cy="68" r="7" fill="#E8EDF5"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>

  <!-- === THEME 2: Gold === -->
  <g transform="translate(40, 172)">
    <rect width="350" height="84" rx="6" fill="#1C2535"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#243044"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>
    <text x="78" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#E8EDF5">Zelta Gold ⭐</text>
    <text x="78" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#E8EDF5" opacity="0.6">Bright logo gold - Recommended</text>
    <circle cx="78"  cy="68" r="7" fill="#1C2535"/>
    <circle cx="98"  cy="68" r="7" fill="#243044"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#E8EDF5"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>

  <!-- === THEME 3: Intense === -->
  <g transform="translate(40, 268)">
    <rect width="350" height="84" rx="6" fill="#1A1F2E"/>
    <rect width="6" height="84" rx="3" fill="#F5C400"/>
    <rect x="6" y="0" width="56" height="84" fill="#252D3D"/>
    <rect x="20" y="18" width="28" height="48" rx="3" fill="#F5C400" opacity="0.9"/>

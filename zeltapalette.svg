    <circle cx="98"  cy="68" r="7" fill="#243044"/>
    <circle cx="118" cy="68" r="7" fill="#56B4E9"/>
    <circle cx="138" cy="68" r="7" fill="#E69F00"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
  </g>


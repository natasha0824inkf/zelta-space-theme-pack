    <circle cx="98"  cy="68" r="7" fill="#EEEEEE" stroke="#ddd" stroke-width="1"/>
    <circle cx="118" cy="68" r="7" fill="#F5C400"/>
    <circle cx="138" cy="68" r="7" fill="#1C2535"/>
    <circle cx="158" cy="68" r="7" fill="#F5C400"/>
